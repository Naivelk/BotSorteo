# =========================================================
#  CONFIGURACIÓN DE TU BUSCADOR DE SORTEOS
#  Edita esta parte cuando quieras. No toques el código.
# =========================================================

# Palabras que debe buscar (en YouTube y en los feeds).
# Un sorteo cuenta si el título o la descripción contiene ALGUNA de estas.
palabras_clave:
  - sorteo
  - giveaway
  - regalo
  - gana
  - concurso
  - premio
  - rifa

# Palabras que DESCARTAN un resultado (aunque tenga una palabra clave).
# Sirve para quitar ruido: noticias del "sorteo del Mundial", lotería, etc.
# Añade las que veas que te llegan y no quieres.
palabras_excluir:
  # --- deportes: ahí "sorteo" = sorteo de partidos, no un regalo ---
  - mundial
  - dazn
  - eliminatorias
  - eliminatoria
  - champions
  - supercopa
  - endesa
  - libertadores
  - sudamericana
  - copa américa
  - copa america
  - fase de grupos
  - octavos de final
  - calendario de partidos
  # --- loterías y azar (solo publican números, no son giveaways) ---
  - lotería
  - loteria
  - loto
  - lotto
  - baloto
  - melate
  - powerball
  - mega millions
  - quiniela
  - sorteo tris
  - kino
  - sinuano
  - astro luna
  - astro sol
  - dorado mañana
  - dorado tarde
  - dorado noche
  - chontico
  - paisita
  - culona
  - motilón
  - motilon
  - caribeña
  - caribena
  - pijao
  - cafeterito
  - fantástica
  - fantastica
  - gordo de navidad
  - premio mayor
  - balota
  - balotas
  - número ganador
  - numero ganador
  - números ganadores
  - numeros ganadores
  - juega en el departamento
  # --- migración / trámites ---
  - visa americana
  - green card
  - sorteo de visas
  # --- restringidos a un país que no te sirve ---
  - us only
  - u.s. only
  - usa only
  - united states only
  - uk only
  - solo españa
  - solo espana
  - solo méxico
  - solo mexico
  - solo argentina
  - solo chile

# Palabras que descartan SOLO si aparecen en el TÍTULO.
# Son sorteos que YA se hicieron (anuncios de ganadores/resultados).
# Se miran solo en el título para no descartar un sorteo bueno cuya
# descripción diga "anunciaré los ganadores el viernes".
palabras_excluir_titulo:
  - ganador del sorteo
  - ganadora del sorteo
  - ganadores del sorteo
  - ganadoras del sorteo
  - anuncio de ganadores
  - lista de ganadores
  - winners
  - winner announcement
  - we have a winner
  - i won
  - resultado del
  - resultados del
  - tras el sorteo
  - sorteo cerrado
  - sorteo finalizado
  - ya finalizó
  - ya finalizo

# Señales de que un sorteo es INTERNACIONAL / abierto a Latinoamérica.
# Los que tengan alguna de estas se marcan con 🌎 y van primero en el resumen.
senales_internacional:
  - internacional
  - international
  - worldwide
  - todo el mundo
  - todos los paises
  - todos los países
  - envío internacional
  - envio internacional
  - ships worldwide
  - open worldwide
  - latinoamérica
  - latinoamerica
  - latam
  - hispanoamérica
  - hispanoamerica

# Señales de que un sorteo es DE / PARA COLOMBIA. Se marcan con 🇨🇴 y van primero.
senales_colombia:
  - colombia
  - colombiano
  - colombiana
  - colombianos
  - colombianas

# Solo avisar de sorteos publicados en los últimos X días (descarta lo viejo).
max_dias_antiguedad: 4

# --------- CÓMO TE AVISA ---------
# modo_resumen: true  -> un solo mensaje al día con la lista (recomendado)
# modo_resumen: false -> un mensaje suelto por cada sorteo (con imagen)
modo_resumen: true
max_por_resumen: 40   # máximo de sorteos en el resumen del día

# --------- YOUTUBE ---------
# Búsquedas que se hacen en YouTube cada vez que corre.
# Enfocadas en sorteos internacionales / abiertos a Latinoamérica.
youtube_busquedas:
  # internacionales / abiertos a Latinoamérica
  - sorteo internacional
  - sorteo envío internacional
  - giveaway worldwide
  - international giveaway
  - sorteo latinoamérica
  - giveaway ships worldwide
  # enfocados en Colombia
  - sorteo colombia
  - giveaway colombia
  - sorteo para colombianos
  # orientados a Instagram / Facebook (indirecto: videos que anuncian el sorteo)
  - sorteo instagram
  - sorteo facebook

# (Opcional) Canales concretos que quieras vigilar.
# Pega el ID del canal (empieza por UC...). Déjalo vacío si no quieres.
youtube_canales: []
  # - UCxxxxxxxxxxxxxxxxxxxxxx

# Solo videos publicados en las últimas X horas (para no repetir viejos).
youtube_horas_atras: 48

# --------- WEBS / NOTICIAS DE SORTEOS (RSS) ---------
# Usamos Google News RSS: es estable, gratis y busca por palabra.
# Cada URL es una búsqueda distinta. Puedes añadir o cambiar las palabras
# (lo que va después de q= , separando con + los espacios).
feeds_rss:
  - "https://news.google.com/rss/search?q=sorteo+internacional&hl=es-419&gl=US&ceid=US:es"
  - "https://news.google.com/rss/search?q=sorteo+env%C3%ADo+internacional&hl=es-419&gl=US&ceid=US:es"
  - "https://news.google.com/rss/search?q=giveaway+worldwide&hl=en-US&gl=US&ceid=US:en"
  - "https://news.google.com/rss/search?q=international+giveaway+enter&hl=en-US&gl=US&ceid=US:en"
  - "https://news.google.com/rss/search?q=sorteo+colombia+-loteria+-baloto+-chance+-resultados+-astro&hl=es-419&gl=CO&ceid=CO:es"
  - "https://news.google.com/rss/search?q=sorteo+gratis+colombia+-loteria+-resultados&hl=es-419&gl=CO&ceid=CO:es"
  # Instagram / Facebook (indirecto, vía noticias que mencionan el sorteo)
  - "https://news.google.com/rss/search?q=sorteo+instagram&hl=es-419&gl=CO&ceid=CO:es"
  - "https://news.google.com/rss/search?q=giveaway+instagram&hl=en-US&gl=US&ceid=US:en"

